---
layout: default
title: Philipp Schmidt
---

<div id="home">
  <h1>Posts (<a href="/feed.xml" target="_blank">RSS</a>)
</h1>
  <ul class="posts">
    {% for post in site.posts %}
         {% unless post.category == "food" %}
            <li><span>{{ post.date | date_to_string }}</span> &raquo; <a href="{{ post.url }}">{{ post.title }}</a></li>
            {% endunless %}
    {% endfor %}
  </ul>
  <h2><a href="/archive/">Archive of old posts</a></h2>
</div>
